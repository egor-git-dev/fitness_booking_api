version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: egor
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: fitness_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://egor:1234@db:5432/fitness_db

volumes:
  pgdata:
